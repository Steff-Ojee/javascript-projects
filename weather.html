<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #87CEEB;
        }

        h1 {
            color: white;
        }

        button {
            background-color: white;
            padding: 8px 16px;
            border: lightseagreen 2px solid;
            border-radius: 50px;
            cursor: pointer;
        }

        #result {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <h1>Weather App</h1>
    <input id="cityInput" type="text" placeholder="Type a city...">
    <button onclick="getWeather()">Search</button>
    <p id="result"></p>

    <script>
        function getEmoji(weather) {
            if (weather.includes('rain')) return '🌧️'
            if (weather.includes('cloud')) return '☁️'
            if (weather.includes('clear')) return '☀️'
            if (weather.includes('snow')) return '❄️'
            if (weather.includes('thunder')) return '⛈️'
            return '🌥️'
        }
        async function getWeather() {
            try {
                let city = document.getElementById('cityInput').value
                let apikey = 'e17693f196906a55669e18887084a85c'
                let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apikey}&units=metric`

                let response = await fetch(url)
                let data = await response.json()

                if (data.cod === '404') {
                    document.getElementById('result').textContent = 'City not found!'
                } else {
                    let weather = data.weather[0].description
                    let wind = data.wind.speed
                    let emoji = getEmoji(weather)
                    document.getElementById('result').textContent =
                        `${emoji} ${data.name}: ${data.main.temp}°C, ${weather}, wind: ${wind} m/s, ${data.main.humidity}% humidity`
                }
            } catch {
                document.getElementById('result').textContent = 'Something went wrong!'
            }
        }
    </script>
</body>

</html>
